# 마우스 지원 (휠 스크롤 / 패널 클릭 / 크기 조절)
set -g mouse on

# 히스토리 버퍼 늘리기
set -g history-limit 50000

# 창/패널 번호 1부터
set -g base-index 1
setw -g pane-base-index 1

# 24-bit true color (wezterm 대응)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# ESC 지연 제거 (Claude Code / vi 모드 반응성)
set -s escape-time 0

# 상태바 갱신 주기
set -g status-interval 5

# 패널 분할 (prefix + \ 세로, prefix + - 가로)
# 주: wezterm은 Shift+\로 |를 만들지만 tmux는 평문 \를 그대로 바인딩
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 설정 리로드 단축키
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# copy-mode에서 맨 아래로 점프 후 복귀 (Ctrl+End / End / q 중 편한 것 사용)
bind -T copy-mode    C-End send-keys -X history-bottom \; send-keys -X cancel
bind -T copy-mode-vi C-End send-keys -X history-bottom \; send-keys -X cancel
bind -T copy-mode    End   send-keys -X history-bottom \; send-keys -X cancel
bind -T copy-mode-vi End   send-keys -X history-bottom \; send-keys -X cancel

# 스크롤 중 프롬프트 입력하면 자동 복귀 (mouse scroll 시 유용)
set -g @scroll-without-changing-pane on
